name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: App/package-lock.json

      - name: Install dependencies
        working-directory: App
        run: npm ci

      - name: Type check
        working-directory: App
        run: npx tsc --noEmit

  build-and-push:
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.CAPSTONE_CI_VAR }}
          password: ${{ secrets.Capstone_CI_Secret }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ vars.CAPSTONE_CI_VAR }}/capstonefront:latest,${{ vars.CAPSTONE_CI_VAR }}/capstonefront:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
