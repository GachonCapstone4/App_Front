name: CI

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-push:
    if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.CAPSTONE_CI_VAR }}
          password: ${{ secrets.Capstone_CI_Secret }}

      - name: Debug info
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref }}"
          echo "Push flag: ${{ github.event_name == 'push' }}"
          echo "DockerHub user: ${{ vars.CAPSTONE_CI_VAR }}"
          echo "Image tag: ${{ vars.CAPSTONE_CI_VAR }}/capstonefront:latest"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ vars.CAPSTONE_CI_VAR }}/capstonefront:latest,${{ vars.CAPSTONE_CI_VAR }}/capstonefront:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=https://capstone.studylink.click
            VITE_ADMIN_API_BASE_URL=https://admin.studylink.click
            VITE_SSE_BASE_URL=https://capstone.studylink.click
            VITE_DEMO_MODE=false
          cache-from: type=gha
          cache-to: type=gha,mode=min

  release-desktop:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    name: Build Electron app (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: App

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: App/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Sync app version from tag
        run: node -e "const fs = require('fs'); const pkg = require('./package.json'); pkg.version = process.env.GITHUB_REF_NAME.replace(/^v/, ''); fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Build Electron distributable
        run: npm run electron:dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          VITE_API_BASE_URL: https://capstone.studylink.click
          VITE_ADMIN_API_BASE_URL: https://admin.studylink.click
          VITE_SSE_BASE_URL: https://capstone.studylink.click
          VITE_DEMO_MODE: "false"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            App/release/*.dmg
            App/release/*.exe
            App/release/*.msi
            App/release/*.AppImage
            App/release/*.deb
          if-no-files-found: error
          retention-days: 7

  publish-desktop-release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: release-desktop

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          generate_release_notes: true
